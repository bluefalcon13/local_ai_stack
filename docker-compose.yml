services:
  # --- THE GATEWAY ---
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    user: "${SERVICE_UID}:${SERVICE_UID}"
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    networks:
      - ai-frontend

  # --- The GATEKEEPER ---
  caddy:
    build:
      context: ${CONFIG_ROOT}/caddy/
      dockerfile: Dockerfile
    container_name: caddy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    user: "$SERVICE_UID:$SERVICE_UID"
    read_only: true
    restart: unless-stopped
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
      - TLS_CLIENT_CERT_NAME=${TLS_CLIENT_CERT_NAME}
      - TLS_CLIENT_KEY_NAME=${TLS_CLIENT_KEY_NAME}
      - CLOUDFLARE_AUTH_ORIGIN_PULL_CERT_NAME=${CLOUDFLARE_AUTH_ORIGIN_PULL_CERT_NAME}
      - CLOUDFLARE_EMAIL=${CLOUDFLARE_EMAIL}
    volumes:
      - ${CONFIG_ROOT}/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${CONFIG_ROOT}/caddy/cloudflare_certs:/etc/caddy/certs:ro
      - /home/${SERVICE_USER}/caddy/data:/data:rw
      - /home/${SERVICE_USER}/caddy/config:/config:rw
      # Caddy also needs a small writeable space for temp files/shm
      - type: tmpfs
        target: /tmp
    ports:
      - "192.168.50.4:443:443"
    networks:
      - ai-frontend

  # --- THE AGENTIC BRAIN ---
  langgraph:
    image: langchain/langgraph-api:latest
    container_name: langgraph-api
    restart: unless-stopped
    user: "${SERVICE_UID}:${SERVICE_UID}"
    environment:
      - OLLAMA_BASE_URL=http://ollama-main:11434
      - DATABASE_URI=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@langgraph-db:5432/${POSTGRES_DB}
    volumes:
      - ${CONFIG_ROOT}/langgraph/agents:/app/agents
    networks:
      - ai-frontend
      - ai-isolated 
    depends_on:
      - langgraph-db

  langgraph-db:
    image: postgres:16
    container_name: langgraph-db
    user: "${SERVICE_UID}:${SERVICE_UID}"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /home/${SERVICE_USER}/langgraph_db:/var/lib/postgresql/data
    networks:
      - ai-isolated

  # --- THE INTERFACE ---
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    user: "${SERVICE_UID}:${SERVICE_UID}"
    environment:
      - 'WEBUI_SECRET_KEY=${WEBUI_SECRET}'
      # ADMIN setup
      - WEBUI_ADMIN_EMAIL=${WEBUI_ADMIN_EMAIL}
      - WEBUI_ADMIN_PASSWORD=${WEBUI_ADMIN_PASSWORD}
      # OAUTH setup
      - ENABLE_OAUTH_PERSISTENT_CONFIG=true
      - ENABLE_OAUTH_SIGNUP=true
      - GOOGLE_CLIENT_ID=${GOOGLE_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_SECRET}
      - OAUTH_MERGE_ACCOUNTS_BY_EMAIL="true"
      - OPENID_PROVIDER_URL=https://accounts.google.com/.well-known/openid-configuration
      - DEFAULT_USER_ROLE=pending
      - ENABLE_SIGNUP=false
      - 'OPENAI_API_BASE_URLS=http://lemonade-main:42421/v1;http://langgraph:8000/v1'
      - 'OPENAI_API_KEYS=sk-lemonade;sk-langgraph' 
      - 'SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>'
    volumes:
      - /home/${SERVICE_USER}/webui_data:/app/backend/data
    networks:
      - ai-frontend
      - ai-search
      - ai-isolated

  # --- THE MUSCLE (STRIX HALO POWER) ---
  lemonade-main:
    build:
      context: ${CONFIG_ROOT}/lemonade/
      dockerfile: Dockerfile
      args:
        - UID=${SERVICE_UID}
        - GID=${SERVICE_UID}
        - USERNAME=${SERVICE_USER}
        - VIDEO_GROUP=${VIDEO_GID}
        - RENDER_GROUP=${RENDER_GID}
    image: strix-lemonade:latest
    container_name: lemonade-main
    user: "${SERVICE_UID}:${SERVICE_UID}"
    group_add:
      - ${VIDEO_GID}
      - ${RENDER_GID}
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
      - /dev/accel/accel0:/dev/accel/accel0
    shm_size: '96gb'
    ipc: host
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_PTRACE
    restart: unless-stopped
    tmpfs:
      - /tmp:size=128M,mode=1777
    volumes:
      - /home/${SERVICE_USER}/lemonade/models:/home/${SERVICE_USER}/models
      - /home/${SERVICE_USER}/lemonade/state:/home/${SERVICE_USER}/.cache/lemonade
      - /home/${SERVICE_USER}/lemonade/cache:/home/${SERVICE_USER}/.cache/huggingface
    environment:
      - LEMONADE_EXTRA_MODELS_DIR=/home/${SERVICE_USER}/models
      - ROC_ENABLE_PREFETCH_MSI=1
      - HSA_ENABLE_SDMA=0
      - ROCR_VISIBLE_DEVICES=0
      - GGML_HIP_UMA=1
      - GGML_HIP_ROCWMMA=ON
      - LEMONADE_AUTOLOAD_MODEL=user.gemma-3-27b 
      - HF_TOKEN=${HUGGING_FACE_TOKEN}
      - LEMONADE_DEBUG=1
      - 'LEMONADE_LLAMACPP_ARGS=--flash-attn on --ubatch-size 1024 --ctx-size 32768 --ngl 999 --parallel 4'
    command:
      - lemonade-server
      - serve
      - --no-tray
      # - user.gemma-3-27b
      - --host
      - 0.0.0.0
      - --port
      - "42421"
      - --log-level
      - debug
    networks:
      - ai-isolated

  tpu-worker:
    image: localai/localai:latest-tpu
    container_name: tpu-worker
    user: "${SERVICE_UID}:${SERVICE_UID}"
    devices:
      - /dev/apex_0:/dev/apex_0
    networks:
      - ai-isolated

  # --- SEARCH & METRICS ---
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: searxng
    user: "${SERVICE_UID}:${SERVICE_UID}"
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET}
    volumes:
      - ${CONFIG_ROOT}/searxng:/etc/searxng:ro
    networks:
      - ai-search

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    user: "${SERVICE_UID}:${SERVICE_UID}"
    networks:
      - ai-frontend

# Add this to capture the "Smoking Gun"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  ai-frontend:
    driver: bridge
  ai-search:
    driver: bridge
  ai-isolated:
    driver: bridge
    internal: true