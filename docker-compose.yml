services:
  # --- THE GATEWAY ---
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    user: "${SERVICE_UID}:${SERVICE_UID}"
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    networks:
      - ai-frontend

  # --- The GATEKEEPER ---
  caddy:
    build:
      context: ${CONFIG_ROOT}/caddy/
      dockerfile: Dockerfile
    container_name: caddy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    user: "${SERVICE_UID}:${SERVICE_UID}"
    read_only: true
    restart: unless-stopped
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
      - TLS_CLIENT_CERT_NAME=${TLS_CLIENT_CERT_NAME}
      - TLS_CLIENT_KEY_NAME=${TLS_CLIENT_KEY_NAME}
      - CLOUDFLARE_AUTH_ORIGIN_PULL_CERT_NAME=${CLOUDFLARE_AUTH_ORIGIN_PULL_CERT_NAME}
      - CLOUDFLARE_EMAIL=${CLOUDFLARE_EMAIL}
    volumes:
      - ${CONFIG_ROOT}/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${CONFIG_ROOT}/caddy/cloudflare_certs:/etc/caddy/certs:ro
      - /home/${SERVICE_USER}/caddy/data:/data:rw
      - /home/${SERVICE_USER}/caddy/config:/config:rw
      - type: tmpfs
        target: /tmp
    ports:
      - "192.168.50.4:443:443"
      - "192.168.50.4:42421:42421"
      - "192.168.50.4:42422:42422"
    networks:
      - ai-frontend
      - lemonade-internal

  # --- THE AGENTIC BRAIN ---
  langgraph:
    image: langchain/langgraph-api:latest
    container_name: langgraph-api
    restart: unless-stopped
    user: "${SERVICE_UID}:${SERVICE_UID}"
    environment:
      - OPENAI_API_BASE_URL=http://lemonade-main:11434/v1
      - RAG_OPENAI_API_BASE_URL=http://lemonade-main:11434/v1
      - OPENAI_API_KEY=sk-local
      - DATABASE_URI=postgres://${LANG_POSTGRES_USER}:${LANG_POSTGRES_PASSWORD}@nuq-postgres:5432/${LANG_POSTGRES_DB}
    volumes:
      - ${CONFIG_ROOT}/langgraph/agents:/app/agents
    networks:
      - ai-frontend
      - ai-isolated 
    depends_on:
      - langgraph-db
    profiles: ["NOT_IMPLEMENTED"]

  # --- THE INTERFACE ---
  open-webui:
    build:
      context: ${CONFIG_ROOT}/open-webui/
      dockerfile: Dockerfile
    # image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    user: "${SERVICE_UID}:${SERVICE_UID}"
    environment:
      - 'WEBUI_SECRET_KEY=${WEBUI_SECRET}'
      # ADMIN setup
      - WEBUI_ADMIN_EMAIL=${WEBUI_ADMIN_EMAIL}
      - WEBUI_ADMIN_PASSWORD=${WEBUI_ADMIN_PASSWORD}
      # OAUTH setup
      - ENABLE_OAUTH_PERSISTENT_CONFIG=true
      - ENABLE_OAUTH_SIGNUP=true
      - GOOGLE_CLIENT_ID=${GOOGLE_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_SECRET}
      - OAUTH_MERGE_ACCOUNTS_BY_EMAIL="true"
      - OPENID_PROVIDER_URL=https://accounts.google.com/.well-known/openid-configuration
      - DEFAULT_USER_ROLE=pending
      - ENABLE_SIGNUP=false
      - OPENAI_API_BASE_URLS=http://langgraph:8000/v1
      - OPENAI_API_KEYS=sk-langgraph
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>
      - ENABLE_OTEL=true
      - ENABLE_OTEL_TRACES=true
      - ENABLE_OTEL_METRICS=false
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://phoenix:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc    # Force gRPC protocol
      - OTEL_EXPORTER_OTLP_INSECURE=true
      - OTEL_TRACES_EXPORTER=otlp
      - USE_OTEL_LITELLM_REQUEST_SPAN=true  # Still critical for your chat traces
      - OTEL_SERVICE_NAME=open-webui
      - OTEL_PYTHON_REQUESTS_EXCLUDED_URLS=".*/batch/.*|.*/scrape/.*|.*/health"
      - OTEL_BSP_MAX_QUEUE_SIZE=10000        # Increase buffer for your 7k+ spikes
      - OTEL_BSP_SCHEDULE_DELAY_MILLIS=1000 # Send every 1 second
      - OTEL_BSP_MAX_EXPORT_BATCH_SIZE=512
      - RAG_EMBEDDING_BATCH_SIZE=4
      - RAG_EMBEDDING_TIMEOUT=300
    volumes:
      - /home/${SERVICE_USER}/webui_data:/app/backend/data
    networks:
      - ai-frontend
      - ai-search
      - ai-isolated

  # --- THE MUSCLE (STRIX HALO POWER) ---
  lemonade-main:
    build:
      context: ${CONFIG_ROOT}/lemonade/
      dockerfile: Dockerfile
      args:
        - UID=${SERVICE_UID}
        - GID=${SERVICE_UID}
        - USERNAME=${SERVICE_USER}
        - VIDEO_GROUP=${VIDEO_GID}
        - RENDER_GROUP=${RENDER_GID}
    image: strix-lemonade:latest
    container_name: lemonade-main
    user: "${SERVICE_UID}:${SERVICE_UID}"
    group_add:
      - ${VIDEO_GID}
      - ${RENDER_GID}
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
      - /dev/accel/accel0:/dev/accel/accel0
    ulimits:
      memlock:
        soft: -1
        hard: -1
    shm_size: '96gb'
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_PTRACE
    ipc: host
    restart: unless-stopped
    tmpfs:
      - /tmp:size=128M,mode=1777
    volumes:
      - /home/${SERVICE_USER}/lemonade/models:/home/${SERVICE_USER}/models
      - /home/${SERVICE_USER}/lemonade/state:/home/${SERVICE_USER}/.cache/
      - /home/${SERVICE_USER}/lemonade/flm_models:/home/${SERVICE_USER}/.config/flm/models
    environment:
      - ROC_ENABLE_PREFETCH_MSI=1
      - HSA_ENABLE_SDMA=0
      - ROCR_VISIBLE_DEVICES=0
      - GGML_HIP_UMA=1
      - GGML_HIP_ROCWMMA=ON
      - HF_TOKEN=${HUGGING_FACE_TOKEN}
      - LEMONADE_DEBUG=1
      - ROCM_USE_USER_QUEUE=1
      - LEMONADE_FLM_LINUX_BETA=1
      - LEMONADE_MAX_LOADED_MODELS=2
    command:
      - lemonade-server
      - run
      # - serve
      - user.devstral-small-2-24b
      - --no-tray
      - --host 
      - "0.0.0.0"
      - --port
      - "11434"
      - --log-level
      - "debug"
    # network_mode: host
    networks:
      ai-isolated:
      lemonade-internal:
        aliases:
          - lemonade-backend

  comfy-strix:
    container_name: comfy-strix
    build:
      context: ${CONFIG_ROOT}/comfyui/
      dockerfile: Dockerfile
      args:
        - UID=${SERVICE_UID}
        - GID=${SERVICE_UID}
        - USERNAME=${SERVICE_USER}
    user: "${SERVICE_UID}:${SERVICE_UID}"
    environment:
      - ROCBLAS_USE_HIPBLASLT=1 # Critical for those sweet FP16/BF16 speeds
      - PYTORCH_ROCM_ARCH=gfx1151
    ports:
      - "8188:8188"
    volumes:
      # Map to your local folders to keep weights persistent
      - /home/${SERVICE_USER}/comfy/models:/opt/ComfyUI/models
      - /home/${SERVICE_USER}/comfy/output:/opt/ComfyUI/output
      - /home/${SERVICE_USER}comfy/custom_nodes:/opt/ComfyUI/custom_nodes
      - /home/${SERVICE_USER}/comfy/user:/opt/ComfyUI/user
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - ${VIDEO_GID}
      - ${RENDER_GID}
    security_opt:
      - seccomp=unconfined
    ipc: host
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
    ulimits:
      memlock:
        soft: -1
        hard: -1
    entrypoint: [""]
    command: >
      python3 /opt/ComfyUI/main.py 
      --listen 0.0.0.0 
      --port 8188 
      --base-directory /opt/ComfyUI
      --fp8_e4m3fn-unet 
      --fp8_e4m3fn-text-enc 
      --highvram 
      --use-sage-attention
      --preview-method auto
    shm_size: '30gb'
    networks:
      ai-isolated:
      lemonade-internal:
        aliases:
          - comfy-backend

  # --- SEARCH & METRICS ---
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: searxng
    user: "${SERVICE_UID}:${SERVICE_UID}"
    cap_add:
      - NET_ADMIN
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET}
      - FORCE_OWNERSHIP=false 
    volumes:
      - /home/${SERVICE_USER}/searxng/config:/etc/searxng:rw
      - /home/${SERVICE_USER}/searxng/logs:/var/log/searxng:rw
    ports:
      - "8080:8080"
    networks:
      - ai-search
    # network_mode: host
    restart: unless-stopped

  tika:
    image: apache/tika:latest-full
    container_name: tika
    user: "${SERVICE_UID}:${SERVICE_UID}"
    ports:
      - "9998:9998"
    restart: always
    networks:
      - ai-search
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9998/tika"]
      interval: 30s
      timeout: 10s
      retries: 3


  # --- Webcrawl via firecrawl ---
  nuq-postgres:
    extends:
      file: ${CONFIG_ROOT}/firecrawl/docker-compose.yaml
      service: nuq-postgres
    container_name: nuq-postgres
    networks:
      - ai-search
    user: "${SERVICE_UID}:${SERVICE_UID}"
    volumes:
      - /home/${SERVICE_USER}/local_ai_db:/var/lib/postgresql/data
      - ${CONFIG_ROOT}/data_base_config/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
      # Path updated to configs/firecrawl
      - ${CONFIG_ROOT}/firecrawl/apps/nuq-postgres/nuq.sql:/firecrawl_setup/nuq.sql:ro
    environment:
      - POSTGRES_USER=${SERVICE_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - FIRE_POSTGRES_USER=${FIRE_POSTGRES_USER}
      - FIRE_POSTGRES_PASSWORD=${FIRE_POSTGRES_PASSWORD}
      - FIRE_POSTGRES_DB=${FIRE_POSTGRES_DB}
      - LANG_POSTGRES_USER=${LANG_POSTGRES_USER}
      - LANG_POSTGRES_PASSWORD=${LANG_POSTGRES_PASSWORD}
      - LANG_POSTGRES_DB=${LANG_POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: 
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_cron"
      - "-c"
      - "cron.database_name=${POSTGRES_DB:-firecrawl}"

  # --- FIRECRAWL API ---
  api:
    extends:
      file: ${CONFIG_ROOT}/firecrawl/docker-compose.yaml
      service: api
    container_name: api
    networks:
      - ai-search
    user: "${SERVICE_UID}:${SERVICE_UID}"
    environment:
      - DATABASE_URL=postgresql://${FIRE_POSTGRES_USER}:${FIRE_POSTGRES_PASSWORD}@nuq-postgres:5432/${FIRE_POSTGRES_DB}
      - REDIS_URL=${FIRE_REDIS_URL}
      - PLAYWRIGHT_MICROSERVICE_URL=${PLAYWRIGHT_MICROSERVICE_URL}
      - SELF_HOSTED_PLAYWRIGHT=true
      - API_KEY=${FIRE_API_KEY}
      - SCRAPE_TIMEOUT=60000
      - PAGE_TIMEOUT=30000
    depends_on:
      rabbitmq:
        condition: service_healthy # Wait for the Rabbit to be READY
      nuq-postgres:
        condition: service_healthy

  # --- PLAYWRIGHT (The Browser) ---
  playwright-service:
    extends:
      file: ${CONFIG_ROOT}/firecrawl/docker-compose.yaml
      service: playwright-service
    container_name: playwright-service
    networks:
      - ai-search
    # Resource limits to protect your Strix Halo's RAM for LLMs

  rabbitmq:
    extends:
      file: ${CONFIG_ROOT}/firecrawl/docker-compose.yaml
      service: rabbitmq
    container_name: rabbitmq
    networks:
      - ai-search
    # No ports needed unless you want to see the dashboard at 15672
    deploy:
      resources:
        limits:
          memory: 256M

  # --- REDIS (The Queue) ---
  redis:
    extends:
      file: ${CONFIG_ROOT}/firecrawl/docker-compose.yaml
      service: redis
    container_name: redis
    networks:
      - ai-search
    user: "${SERVICE_UID}:${SERVICE_UID}"
    deploy:
      resources:
        limits:
          memory: 1G 
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  phoenix:
    image: arizephoenix/phoenix:nightly-nonroot
    container_name: phoenix
    user: "${SERVICE_UID}:${SERVICE_UID}"
    ports:
      - "6006:6006"
    environment:
      - PHOENIX_WORKING_DIR=/tmp/persistent/
      - PHOENIX_PORT=6006
      - PHOENIX_GRPC_PORT=4317
      - PHOENIX_HTTP_PORT=4318
    networks:
      - ai-frontend
      - ai-search
      - ai-isolated
    volumes:
      - /home/${SERVICE_USER}/phoenix:/tmp/persistent/
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  ai-frontend:
    driver: bridge
  ai-search:
    name: ai-search
    driver: bridge
  ai-isolated:
    driver: bridge
    internal: true
  lemonade-internal:
    driver: bridge
    internal: true
  nat-internet:
    name: nat-internet
    driver: bridge
  backend:
    name: ai-search
    driver: bridge
    external: true
