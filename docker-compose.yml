services:
  # --- THE GATEWAY ---
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    user: "${SERVICE_UID}:${SERVICE_UID}"
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    networks:
      - ai-frontend

  # --- The GATEKEEPER ---
  caddy:
    build:
      context: ${CONFIG_ROOT}/caddy/
      dockerfile: Dockerfile
    container_name: caddy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    user: "${SERVICE_UID}:${SERVICE_UID}"
    read_only: true
    restart: unless-stopped
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
      - TLS_CLIENT_CERT_NAME=${TLS_CLIENT_CERT_NAME}
      - TLS_CLIENT_KEY_NAME=${TLS_CLIENT_KEY_NAME}
      - CLOUDFLARE_AUTH_ORIGIN_PULL_CERT_NAME=${CLOUDFLARE_AUTH_ORIGIN_PULL_CERT_NAME}
      - CLOUDFLARE_EMAIL=${CLOUDFLARE_EMAIL}
    volumes:
      - ${CONFIG_ROOT}/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${CONFIG_ROOT}/caddy/cloudflare_certs:/etc/caddy/certs:ro
      - /home/${SERVICE_USER}/caddy/data:/data:rw
      - /home/${SERVICE_USER}/caddy/config:/config:rw
      # Caddy also needs a small writeable space for temp files/shm
      - type: tmpfs
        target: /tmp
    ports:
      - "192.168.50.4:443:443"
    networks:
      - ai-frontend

  # --- THE AGENTIC BRAIN ---
  langgraph:
    image: langchain/langgraph-api:latest
    container_name: langgraph-api
    restart: unless-stopped
    user: "${SERVICE_UID}:${SERVICE_UID}"
    environment:
      - OLLAMA_BASE_URL=http://ollama-main:11434
      - DATABASE_URI=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@langgraph-db:5432/${POSTGRES_DB}
    volumes:
      - ${CONFIG_ROOT}/langgraph/agents:/app/agents
    networks:
      - ai-frontend
      - ai-isolated 
    depends_on:
      - langgraph-db

  langgraph-db:
    image: postgres:16
    container_name: langgraph-db
    user: "${SERVICE_UID}:${SERVICE_UID}"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /home/${SERVICE_USER}/langgraph_db:/var/lib/postgresql/data
    networks:
      - ai-isolated

  # --- THE INTERFACE ---
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    user: "${SERVICE_UID}:${SERVICE_UID}"
    environment:
      - 'WEBUI_SECRET_KEY=${WEBUI_SECRET}'
      # ADMIN setup
      - WEBUI_ADMIN_EMAIL=${WEBUI_ADMIN_EMAIL}
      - WEBUI_ADMIN_PASSWORD=${WEBUI_ADMIN_PASSWORD}
      # OAUTH setup
      - ENABLE_OAUTH_PERSISTENT_CONFIG=true
      - ENABLE_OAUTH_SIGNUP=true
      - GOOGLE_CLIENT_ID=${GOOGLE_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_SECRET}
      - OAUTH_MERGE_ACCOUNTS_BY_EMAIL="true"
      - OPENID_PROVIDER_URL=https://accounts.google.com/.well-known/openid-configuration
      - DEFAULT_USER_ROLE=pending
      - ENABLE_SIGNUP=false
      - 'OPENAI_API_BASE_URLS=http://lemonade-main:42421/v1;http://langgraph:8000/v1'
      - 'OPENAI_API_KEYS=sk-lemonade;sk-langgraph' 
      - 'SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>'
    volumes:
      - /home/${SERVICE_USER}/webui_data:/app/backend/data
    networks:
      - ai-frontend
      - ai-search
      - ai-isolated

  # --- THE MUSCLE (STRIX HALO POWER) ---
  llama-main:
    build:
      context: ${CONFIG_ROOT}/llama.cpp/
      dockerfile: Dockerfile
      args:
        - UID=${SERVICE_UID}
        - GID=${SERVICE_UID}
        - USERNAME=${SERVICE_USER}
        - VIDEO_GROUP=${VIDEO_GID}
        - RENDER_GROUP=${RENDER_GID}
    image: strix-llama:latest
    container_name: llama-main
    user: "${SERVICE_UID}:${SERVICE_UID}"
    # user: root
    group_add:
      - ${VIDEO_GID}
      - ${RENDER_GID}
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
      - /dev/accel/accel0:/dev/accel/accel0
    shm_size: '24gb'
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_PTRACE
    restart: unless-stopped
    volumes:
      - /home/${SERVICE_USER}/cache/:/home/${SERVICE_USER}/.cache/
    environment:
      - HF_TOKEN=${HUGGING_FACE_TOKEN}
      - IMAGE="google/gemma-3-27b-it-qat-q4_0-gguf"
      - AMD_LOG_LEVEL=3
      - GGML_ROCM_DEBUG=1
    command: > 
      llama-server 
      -hf google/gemma-3-27b-it-qat-q4_0-gguf 
      -c 131072 -ngl 99 -fa on --cache-type-k q4_0
      --cache-type-v q4_0 --no-mmap --host 0.0.0.0
      --port 42421 --verbose-prompt
    # network_mode: host
    networks:
      - ai-isolated

  xdna-main:
    build:
      context: ${CONFIG_ROOT}/xdna_speculative_decoder/
      dockerfile: Dockerfile
      args:
        - UID=${SERVICE_UID}
        - GID=${SERVICE_UID}
        - USERNAME=${SERVICE_USER}
    image: xdna_speculative_decoder:latest
    container_name: xdna-main
    user: "${SERVICE_UID}:${SERVICE_UID}"
    group_add:
      - ${RENDER_GID}
    devices:
      - /dev/accel/accel0:/dev/accel/accel0
    ulimits:
      memlock:
        soft: -1
        hard: -1
    shm_size: '2gb'
    restart: unless-stopped
    volumes:
      - /home/${SERVICE_USER}/xdna/models/:/home/${SERVICE_USER}/models/
      - ${CONFIG_ROOT}/xdna_speculative_decoder/model_list.json:/home/${SERVICE_USER}/config/model_list.json:ro
    environment:
      - HF_TOKEN=${HUGGING_FACE_TOKEN}
      - XDNA_NUM_WORKERS=4
      - OMP_NUM_THREADS=4
      - FLM_MODEL_PATH=/home/${SERVICE_USER}/models/
      - VITIS_AI_EP_SESSION_OPTIONS=npu_device_id:0;config_file:/usr/local/lib/npu_config.json
      - HF_HOME=/home/${SERVICE_USER}/models/
      - FLM_CONFIG_PATH=/home/${SERVICE_USER}/config/model_list.json
    command: tail -f /dev/null
      # flm serve gemma3-1b 
      # --host 0.0.0.0
      # --port 8080
      # --ctx-len 8192
      # --pmode performance
    network_mode: host
    # networks:
      # -ai-isolated

  comfyui:
    image: docker.io/kyuz0/amd-strix-halo-comfyui:latest
    container_name: strix-comfy
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.5.0
      - ROCBLAS_USE_HIPBLASLT=1 # Critical for those sweet FP16/BF16 speeds
      - PYTORCH_ROCM_ARCH=gfx1151
    ports:
      - "8188:8188"
    volumes:
      # Map to your local folders to keep weights persistent
      - ./models:/root/comfy-models
      - ./output:/opt/comfy-output
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    security_opt:
      - seccomp=unconfined # Necessary for some ROCm memory hooks
    # Kyuz0's specific runtime flags for Strix Halo
    command: >
      python main.py 
      --bf16-vae 
      --disable-mmap 
      --cache-none 
      --highvram
    shm_size: '8gb'

  hf-gatekeeper:
    image: kalaksi/tinyproxy:latest
    container_name: hf-gatekeeper
    user: "${SERVICE_UID}:${SERVICE_UID}"
    restart: no
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - ${CONFIG_ROOT}/hf-gatekeeper/tinyproxy.conf:/etc/tinyproxy/tinyproxy.conf:ro
      - ${CONFIG_ROOT}/hf-gatekeeper/whitelist.txt:/etc/tinyproxy/whitelist.txt:ro
    networks:
      - ai-isolated
      - nat-internet
    profiles: ["manual"]

  tpu-worker:
    image: localai/localai:latest-tpu
    container_name: tpu-worker
    user: "${SERVICE_UID}:${SERVICE_UID}"
    devices:
      - /dev/apex_0:/dev/apex_0d
    networks:
      - ai-isolated

  # --- SEARCH & METRICS ---
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: searxng
    user: "${SERVICE_UID}:${SERVICE_UID}"
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET}
    volumes:
      - ${CONFIG_ROOT}/searxng:/etc/searxng:ro
    networks:
      - ai-search

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    user: "${SERVICE_UID}:${SERVICE_UID}"
    networks:
      - ai-frontend

# Add this to capture the "Smoking Gun"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  ai-frontend:
    driver: bridge
  ai-search:
    driver: bridge
  ai-isolated:
    driver: bridge
    internal: true
  nat-internet:
    driver: bridge