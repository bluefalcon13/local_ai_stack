User tinyproxy
Group tinyproxy
Port 3128
Timeout 600

# INCREASE THESE FOR LARGE MODELS
MaxClients 100
MinSpareServers 5
MaxSpareServers 20
StartServers 10

# Allow large headers and chunks
MaxRequestsPerChild 0

# Whitelisting
Filter "/etc/tinyproxy/whitelist.txt"
FilterDefaultDeny Yes

Allow 127.0.0.1
Allow 172.16.0.0/12
Allow 192.168.0.0/16