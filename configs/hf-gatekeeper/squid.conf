# --- NETWORK DEFINITIONS ---
# Define the source: Your 'ai-isolated' bridge range
acl ai_bridge_range src 172.19.0.0/16
acl localhost src 127.0.0.1/32

# --- DOMAIN WHITELIST ---
# The full 2026 Hugging Face ecosystem (Metadata + CDNs)
acl hf_sites dstdomain .huggingface.co
acl hf_sites dstdomain .hf.co
acl hf_sites dstdomain .xethub.com
acl hf_sites dstdomain .xethub.hf.co

# --- PORTS & SAFETY (The Cisco-style baseline) ---
acl SSL_ports port 443
acl Safe_ports port 443
acl CONNECT method CONNECT

# --- ACCESS RULES (The Top-Down Firewall) ---
# 1. Block anything not using port 443 (Safety first)
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# 2. The Air-lock: Allow the Bunker to hit ONLY the whitelisted sites
http_access allow ai_bridge_range hf_sites
http_access allow localhost

# 3. The Final Wall: Deny everything else
http_access deny all

# --- DOCKER & SYSTEM SETTINGS ---
# Listen on the proxy port
http_port 3128

# Non-root optimization: ensures logs go to Docker stdout/stderr
access_log stdio:/dev/stdout
cache_log stdio:/dev/stderr

# Privacy: Don't leak the container ID in headers
visible_hostname hf-gatekeeper
forwarded_for off